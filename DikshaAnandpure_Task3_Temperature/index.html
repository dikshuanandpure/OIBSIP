<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Converter 🌡️</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="converter">
        <span class="icon">🌡️</span>
        <h1>Temperature Converter</h1>
        <p class="subtitle">Enter a value and select units to convert</p>

        <!-- Temperature Input -->
        <div class="input-group">
            <label for="tempInput">Temperature</label>
            <input type="number" id="tempInput" placeholder="Enter temperature" step="any" />
        </div>

        <!-- From / To Dropdowns -->
        <div class="input-row">
            <div class="input-group">
                <label for="fromUnit">From</label>
                <select id="fromUnit">
                    <option value="celsius">Celsius (°C)</option>
                    <option value="fahrenheit" selected>Fahrenheit (°F)</option>
                    <option value="kelvin">Kelvin (K)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="toUnit">To</label>
                <select id="toUnit">
                    <option value="celsius" selected>Celsius (°C)</option>
                    <option value="fahrenheit">Fahrenheit (°F)</option>
                    <option value="kelvin">Kelvin (K)</option>
                </select>
            </div>
        </div>

        <!-- Error Message -->
        <p class="error" id="errorMsg">⚠️ Please enter a valid number</p>

        <!-- Convert Button -->
        <button class="btn-convert" onclick="convertTemperature()">🔄 Convert</button>

        <!-- Result -->
        <div class="result-box" id="resultBox">
            <h3>Converted Temperature</h3>
            <div class="result-value" id="resultDisplay">
                0 <span>°C</span>
            </div>
        </div>

        <!-- "Press Enter" line REMOVED -->
    </div>

    <script src="script.js"></script>

</body>
</html>
